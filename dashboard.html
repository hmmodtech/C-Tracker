<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-TRACKER — Central Tracker Dashboard</title>
    <!-- All your CSS and other head elements are here -->
    <style>
        /* All your original CSS styles are here */
    </style>
</head>
<body>
    <!-- All your original HTML body content is here -->

    <!-- MODALS -->
    <div class="overlay" id="editOverlay">
      <div class="modal narrow">
        <div class="modal-head"><div class="modal-head-left"><span id="editIcon">🧯</span><span class="modal-title" id="editTitle">Edit Tracker</span></div><button class="modal-close" onclick="closeModal('editOverlay')">✕</button></div>
        <div class="modal-body">
          <input type="hidden" id="edit-id">
          <div class="form-group"><label class="form-label">Tracker Name *</label><input type="text" id="edit-name" class="form-input" placeholder="e.g. First Aid Tracker"></div>
          <div class="form-group"><label class="form-label">Description</label><input type="text" id="edit-desc" class="form-input" placeholder="Short description"></div>
          <div class="form-group"><label class="form-label">Icon</label><div class="emoji-grid" id="emojiGrid"></div><input type="text" id="edit-icon-val" class="form-input" placeholder="Or type any emoji" style="margin-top:8px"></div>
          <div class="form-group"><label class="form-label">Google Form URL</label><input type="text" id="edit-formUrl" class="form-input" placeholder="https://docs.google.com/forms/..."></div>
          <div class="form-group"><label class="form-label">Response Sheet ID</label><input type="text" id="edit-sheetId" class="form-input" placeholder="Sheet ID from the URL"><div class="form-hint">/spreadsheets/d/<strong>[PASTE THIS PART]</strong>/edit</div></div>
          
          <!-- THIS IS THE NEW FIELD WE ADDED -->
          <div class="form-group">
            <label class="form-label">Session ID Field Entry ID</label>
            <input type="text" id="edit-sessionIdEntry" class="form-input" placeholder="entry.123456789">
            <div class="form-hint">From your Form → Get pre-filled link → Find the entry ID for your Session ID field.</div>
          </div>
          
          <div id="editErr" style="color:var(--red);font-size:11px;font-family:var(--font-mono);display:none;margin-top:6px"></div>
        </div>
        <div class="modal-foot">
          <button class="btn danger" id="editDeleteBtn" style="display: none; margin-right: auto;" onclick="editModalDelete()">🗑 Remove Tracker</button>
          <button class="btn" onclick="closeModal('editOverlay')">Cancel</button>
          <button class="btn primary" id="editSaveBtn" onclick="saveTracker()">Save Changes</button>
        </div>
      </div>
    </div>
    
    <!-- The rest of your HTML modals are here -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script>
        // All your original JavaScript code is here

        // THIS IS THE MODIFIED renderTrackers function
        function renderTrackers(){
          const grid=document.getElementById('trackersGrid');
          grid.innerHTML='';
          const sortedTrackers = [...trackers].sort((a,b)=>{ /* ... original sorting logic ... */ });
          
          sortedTrackers.forEach(t=>{
            // ... original card setup logic ...
            const card=document.createElement('div');
            card.className='tracker-card'; card.id='tc-'+t.id;
            card.innerHTML=`
              <!-- ... all the other card HTML ... -->
              <div class="card-hover-actions">
                <div class="cha-grid">
                  ${isLocalTracker(t.name)
                    ? `<button class="cha-btn cha-start" onclick="openAddLocalRecord('${t.id}')">
                         <span class="cha-icon">＋</span>
                         <span class="cha-label">Add Record</span>
                         <div class="cha-ripple"></div>
                       </button>`
                    : t.formUrl
                      // THIS IS THE MODIFIED "START CHECK" BUTTON
                      ? `<button class="cha-btn cha-start" onclick="startSessionCheck('${t.id}')">
                           <span class="cha-icon">▶</span>
                           <span class="cha-label">Start Check</span>
                           <div class="cha-ripple"></div>
                         </button>`
                      : `<button class="cha-btn cha-addform" onclick="openEditTracker('${t.id}')">
                           <span class="cha-icon">＋</span>
                           <span class="cha-label">Add Form</span>
                         </button>`}
                  <!-- ... rest of the buttons (Status, Report, Edit, etc.) ... -->
                </div>
              </div>`;
            grid.appendChild(card);
          });
          // ... rest of the renderTrackers function ...
        }

        // THIS IS THE MODIFIED openEditTracker function
        function openEditTracker(editId){
          // ... original function logic ...
          document.getElementById('edit-sheetId').value=t?(t.sheetId||''):'';
          // THIS IS THE NEW LINE
          document.getElementById('edit-sessionIdEntry').value = t ? (t.sessionIdEntry || '') : '';
          // ... rest of the function ...
        }

        // THIS IS THE MODIFIED saveTracker function
        async function saveTracker(){
          const editId=document.getElementById('edit-id').value;
          const name=document.getElementById('edit-name').value.trim();
          if(!name){ /* ... error handling ... */ return; }
          
          // THIS IS THE MODIFIED OBJECT
          const obj={
            name,
            desc:document.getElementById('edit-desc').value.trim(),
            icon:document.getElementById('edit-icon-val').value.trim()||'📋',
            formUrl:document.getElementById('edit-formUrl').value.trim(),
            sheetId:document.getElementById('edit-sheetId').value.trim(),
            sessionIdEntry: document.getElementById('edit-sessionIdEntry').value.trim() // NEW
          };

          // ... rest of the function ...
        }

        // THIS IS THE REPLACED buildVisualFormReport function
        function buildVisualFormReport(t, allRows, idx) {
          const latestRow = allRows[idx];
          const keys = Object.keys(latestRow);
          const sessionIdKey = keys.find(k => k.toLowerCase().includes('session id'));
          
          let sessionRows = [latestRow];
          if (sessionIdKey && latestRow[sessionIdKey]) {
            const currentSessionId = latestRow[sessionIdKey];
            if (currentSessionId.trim() !== '') {
              sessionRows = allRows.filter(r => r[sessionIdKey] === currentSessionId);
            }
          }

          const sessionComp = Math.round(sessionRows.reduce((sum, row) => {
              const iKeys = Object.keys(row).filter(k => !_vSkip(k));
              const answered = iKeys.filter(k => _vClass(row[k] || '') !== 'missing').length;
              return sum + (iKeys.length > 0 ? (answered / iKeys.length) * 100 : 100);
          }, 0) / sessionRows.length);

          const compCls = sessionComp >= 80 ? 'ok' : sessionComp >= 50 ? 'warn' : 'bad';
          const compColor = compCls === 'ok' ? '#2dd17a' : compCls === 'warn' ? '#f0a030' : '#e8394a';
          
          const dateKey = keys.find(_vDateK) || '';
          const nameKey = keys.find(_vNameK) || '';
          const doneBy = latestRow[nameKey] || 'Unknown';
          const fmtDate = _vFmtDate(latestRow[dateKey] || '');

          let reportHtml = `<div class="vfr-wrap">`;

          reportHtml += `
            <div class="vfr-hero" style="border-color: ${compColor}40;">
                <div class="vfr-hero-bg">${(typeof getTrackerSVG === 'function') ? getTrackerSVG(t.name) : ''}</div>
                <div class="vfr-hero-grid"></div>
                <div class="vfr-hero-fade"></div>
                <div class="vfr-hero-inner">
                    <div class="vfr-hero-icon">${t.icon}</div>
                    <div class="vfr-hero-text">
                        <div class="vfr-hero-tag">INSPECTION SESSION REPORT</div>
                        <div class="vfr-hero-title">${esc(t.name)}</div>
                        <div class="vfr-hero-meta">
                            <span>📅 ${esc(fmtDate.split(' · ')[0])}</span>
                            <span>👤 ${esc(doneBy)}</span>
                            <span>📋 ${sessionRows.length} Section${sessionRows.length > 1 ? 's' : ''} Inspected</span>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:28px; font-weight:800; color:${compColor};">${sessionComp}%</div>
                        <div style="font-family:var(--font-mono); font-size:9px; color:rgba(255,255,255,.3); text-transform:uppercase; letter-spacing:.1em;">Overall Score</div>
                    </div>
                </div>
            </div>`;

          sessionRows.forEach((row, index) => {
              const iKeys = Object.keys(row).filter(k => !_vSkip(k));
              const allItems = iKeys.map((k, qi) => ({ k, v: row[k] || '', qi: qi + 1, cls: _vClass(row[k] || '') })).filter(item => item.v.trim() !== '' && item.v !== '—');
              const answered = allItems.filter(x => x.cls !== 'missing');
              const missing = allItems.filter(x => x.cls === 'missing');
              const locKey = Object.keys(row).find(_vLocK) || '';
              const location = row[locKey] || `Section ${index + 1}`;

              reportHtml += `
                <details ${index === 0 ? 'open' : ''} style="margin-bottom: 12px;">
                    <summary style="padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; justify-content: space-between;">
                        <span>${esc(location)}</span>
                        <span style="font-family: var(--font-mono); font-size: 11px; color: var(--muted);">${answered.length}/${allItems.length} Answered</span>
                    </summary>
                    <div style="padding: 15px; border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px;">
                        <div class="vfr-sec-head vfr-sh-green" style="margin-top:0;">
                            <span style="font-size:16px">✅</span>
                            <span class="vfr-sec-title vfr-sec-title-green">Answered Items</span>
                            <span class="vfr-sec-count vfr-sc-green">${answered.length}</span>
                        </div>
                        <div class="vfr-list vfr-list-green">${answered.length > 0 ? answered.map(itemCard).join('') : '<div class="vfr-empty vfr-empty-muted">No answered items in this section.</div>'}</div>
                        
                        ${missing.length > 0 ? `
                        <div class="vfr-sec-head vfr-sh-red" style="margin-top:10px;">
                            <span style="font-size:16px">❌</span>
                            <span class="vfr-sec-title vfr-sec-title-red">Missing / Not Answered</span>
                            <span class="vfr-sec-count vfr-sc-red">${missing.length}</span>
                        </div>
                        <div class="vfr-list vfr-list-red">${missing.map(itemCard).join('')}</div>` : ''}
                    </div>
                </details>
              `;
          });

          reportHtml += `</div>`;
          return reportHtml;
        }

        function itemCard(item) {
            const { k, v, qi, cls } = item;
            const isGreen = cls !== 'missing';
            const isPhoto = cls === 'photo';
            let ansHtml;
            if (isPhoto) {
                const prev = typeof _prev === 'function' ? _prev(v) : v;
                ansHtml = `<img class="vfr-thumb" src="${esc(prev)}" loading="lazy" onclick="openLightbox('${esc(prev)}','${esc(k)}','${esc(v)}')">`;
            } else if (isGreen) {
                ansHtml = `<span class="vfr-item-a vfr-ans-green">✓ ${esc(v)}</span>`;
            } else {
                ansHtml = `<span class="vfr-item-a vfr-ans-red">⚠ Not answered</span>`;
            }
            const itemCls = isGreen ? 'vfr-item vfr-item-green' : 'vfr-item vfr-item-red';
            const dotCls  = isGreen ? 'vfr-dot vfr-dot-green' : 'vfr-dot vfr-dot-red';
            const dotChar = isGreen ? '✓' : '✗';
            return `<div class="${itemCls}">
                <span class="vfr-qnum">Q${qi}</span>
                <span class="${dotCls}">${dotChar}</span>
                <div class="vfr-item-body">
                    <div class="vfr-item-q">${esc(k)}</div>
                    ${ansHtml}
                </div>
            </div>`;
        }

        // THIS IS THE NEW FUNCTION TO ADD
        function startSessionCheck(trackerId) {
          const tracker = trackers.find(t => t.id === trackerId);
          if (!tracker || !tracker.formUrl || !tracker.sessionIdEntry) {
            alert('This tracker is not configured for session tracking. Please set the Form URL and Session ID Entry ID in the tracker settings.');
            return;
          }
          
          const sessionId = `INSP-${Date.now()}`;
          
          let url = tracker.formUrl;
          if (url.includes('?')) {
            url += '&';
          } else {
            url += '?';
          }
          url += `${tracker.sessionIdEntry}=${sessionId}`;
          
          window.open(url, '_blank');
        }

        // The rest of your JavaScript code
    </script>
</body>
</html>
