<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>C-TRACKER — Sign In</title>
<!-- Supabase JS Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;
  --surface:#0f172a;
  --surface2:#1e293b;
  --border:rgba(255,255,255,0.08);
  --brand:#4a9e35;
  --brand2:#3a7c24;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --red:#ef4444;
  --green:#22c55e;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(74,158,53,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.04) 0%, transparent 50%);
}
.card{
  width:100%;
  max-width:420px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 36px;
  box-shadow:0 25px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);
}
.logo{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:28px;
}
.logo-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg, var(--brand), var(--brand2));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(74,158,53,0.35);
  flex-shrink:0;
}
.logo-icon svg{width:22px;height:22px;fill:white}
.logo-text h1{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.logo-text p{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.divider{height:1px;background:var(--border);margin-bottom:28px}
.page-title{font-size:22px;font-weight:700;margin-bottom:6px;color:var(--text)}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.field{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
.input-wrap{position:relative}
input[type=email],input[type=password],input[type=text]{
  width:100%;
  padding:11px 14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:14px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
input:focus{border-color:rgba(74,158,53,0.5);box-shadow:0 0 0 3px rgba(74,158,53,0.08)}
input::placeholder{color:#475569}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#475569;
  transition:color 0.15s;padding:4px;
}
.eye-btn:hover{color:var(--muted)}
.btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg, var(--brand), var(--brand2));
  border:none;border-radius:10px;
  color:white;font-size:15px;font-weight:600;
  cursor:pointer;
  transition:opacity 0.2s,transform 0.1s,box-shadow 0.2s;
  box-shadow:0 4px 16px rgba(74,158,53,0.3);
  margin-top:4px;
}
.btn:hover{opacity:0.92;box-shadow:0 6px 24px rgba(74,158,53,0.45)}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.link-row{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.link-row a{color:var(--brand);text-decoration:none;font-weight:500}
.link-row a:hover{text-decoration:underline}
.msg{
  padding:11px 14px;border-radius:10px;
  font-size:13px;margin-bottom:16px;
  display:none;line-height:1.5;
}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
.msg.success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);color:#86efac}
.demo-box{
  margin-top:24px;
  padding:14px 16px;
  background:rgba(74,158,53,0.06);
  border:1px solid rgba(74,158,53,0.15);
  border-radius:12px;
}
.demo-box-title{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--brand);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.demo-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.demo-row:last-child{margin-bottom:0}
.demo-label{font-size:11px;color:var(--muted)}
.demo-val{
  font-size:11px;font-family:'Courier New',monospace;
  color:var(--text);background:rgba(255,255,255,0.05);
  padding:2px 8px;border-radius:5px;cursor:pointer;
  transition:background 0.15s;
}
.demo-val:hover{background:rgba(74,158,53,0.15);color:var(--brand)}
.spinner{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  display:inline-block;vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.forgot{
  text-align:right;margin-top:-10px;margin-bottom:16px;
  font-size:12px;
}
.forgot a{color:var(--muted);text-decoration:none}
.forgot a:hover{color:var(--brand)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <div class="logo-text">
      <h1>C-TRACKER</h1>
      <p>Central Tracker Dashboard</p>
    </div>
  </div>
  <div class="divider"></div>

  <h2 class="page-title">Welcome back</h2>
  <p class="page-sub">Sign in to your account to continue</p>

  <div class="msg" id="login-msg"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="login-email" placeholder="you@organization.org" autocomplete="email"/>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      <button class="eye-btn" onclick="toggleEye('login-password',this)" type="button">
        <svg id="eye-icon-login" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="forgot"><a href="#">Forgot password?</a></div>

  <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>

  <div class="link-row">
    Don't have an account? <a href="signup.html">Create one</a>
  </div>

  <div class="demo-box">
    <div class="demo-box-title">
      <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a5 5 0 100 10A5 5 0 0012 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
      Demo Account
    </div>
    <div class="demo-row">
      <span class="demo-label">Email</span>
      <span class="demo-val" onclick="fillDemo('email')" title="Click to fill">demo@ctracker.ops</span>
    </div>
    <div class="demo-row">
      <span class="demo-label">Password</span>
      <span class="demo-val" onclick="fillDemo('pass')" title="Click to fill">Demo@2024!</span>
    </div>
  </div>
</div>

<!-- === UPDATED SCRIPT FOR SUPABASE === -->
<script>
// --- Supabase Configuration (from your C-TRACKER file) ---
const SUPABASE_URL = 'https://zyfijmfwupnqxefnashm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5ZmlqbWZ3dXBucXhlZm5hc2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzA2MTYsImV4cCI6MjA5NjQwNjYxNn0.KCMV7zaKNvDKletQhtmS32wQkSMiyMpwz-mgRLeFJ8U';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- UI Helper Functions (from original S-TRACKER) ---
function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.innerHTML = isPass
    ? `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}
function fillDemo(type) {
  if (type === 'email') document.getElementById('login-email').value = 'demo@ctracker.ops';
  if (type === 'pass')  document.getElementById('login-password').value = 'Demo@2024!';
}
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type}`;
  el.style.display = 'block';
}

// --- Supabase Login Logic ---
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = document.getElementById('login-btn');
  if (!email || !password) { showMsg('login-msg','Please enter your email and password.','error'); return; }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      // Use a more user-friendly error message
      let errorMessage = 'Sign in failed. Please check your credentials.';
      if (error.message.includes('Invalid login credentials')) {
        errorMessage = 'Incorrect email or password.';
      } else if (error.message.includes('Email not confirmed')) {
        errorMessage = 'Please check your email to confirm your account first.';
      }
      showMsg('login-msg', errorMessage, 'error');
    } else {
      showMsg('login-msg', '✓ Signed in! Redirecting…', 'success');
      // Redirect to your main dashboard page (e.g., index.html)
      setTimeout(() => {
        // Change 'index.html' to the name of your main dashboard file
        window.location.href = 'dashboard.html'; 
      }, 800);
    }
  } catch (e) {
    showMsg('login-msg', 'Network error. Please try again.', 'error');
  }
  
  btn.disabled = false;
  btn.textContent = 'Sign In';
}

// Add event listener for Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// --- Check if user is already logged in on page load ---
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    // If a session exists, redirect to the dashboard immediately
    window.location.href = 'dashboard.html'; // Change to your dashboard file
  }
})();
</script>
</body>
</html>
